<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSys - Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <div class="w-64 bg-white border-r flex flex-col">
            <div class="p-6 border-b flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-2xl">🏥</div>
                <div class="text-3xl font-semibold text-emerald-600">HealthSys</div>
            </div>
            <nav class="flex-1 px-3 py-6 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-house w-5"></i> Dashboard</a>
                <a href="new-visit.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-plus w-5"></i> New Visit</a>
                <a href="records.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-folder w-5"></i> Records</a>
                <a href="search.html" class="flex items-center gap-3 px-4 py-3 bg-emerald-50 text-emerald-700 rounded-3xl font-medium"><i class="fa-solid fa-magnifying-glass w-5"></i> Search</a>
                <a href="statistics.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-chart-bar w-5"></i> Statistics</a>
            </nav>
            <div class="p-6 border-t">
                <a href="login.html" onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-3xl font-medium"><i class="fa-solid fa-right-from-bracket w-5"></i> Logout</a>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-white border-b px-8 flex items-center justify-between">
                <h1 class="text-2xl font-semibold">Search Health Records</h1>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="font-semibold" id="user-name"></div>
                        <div class="text-xs text-gray-500" id="user-role"></div>
                    </div>
                    <div class="w-9 h-9 bg-emerald-100 rounded-2xl flex items-center justify-center text-xl">👩‍⚕️</div>
                </div>
            </div>

            <div class="flex-1 p-8">
                <div class="max-w-5xl mx-auto">
                    <div class="bg-white rounded-3xl p-2 flex items-center shadow-sm mb-8">
                        <input id="searchInput" type="text" placeholder="Search diseases, conditions..." 
                               class="flex-1 bg-transparent outline-none px-6 py-4 text-lg" onkeypress="if(event.key==='Enter') performSearch()">
                        <button onclick="performSearch()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-4 rounded-3xl font-medium">Search</button>
                    </div>

                    <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    <div id="emptyState" class="hidden text-center py-20">
                        <div class="text-6xl mb-4">🔍</div>
                        <h3 class="text-xl font-medium">No results found</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getRecords() {
            if (!localStorage.getItem('healthRecords')) {
                localStorage.setItem('healthRecords', JSON.stringify([]));
            }
            return JSON.parse(localStorage.getItem('healthRecords'));
        }

        function performSearch() {
            const term = document.getElementById('searchInput').value.trim().toLowerCase();
            const records = getRecords();
            const diseaseMap = {};
            records.forEach(r => {
                const d = r.disease || "Unknown";
                diseaseMap[d] = (diseaseMap[d] || 0) + 1;
            });

            let results = Object.entries(diseaseMap).map(([disease, count]) => ({disease, count}));
            if (term) results = results.filter(r => r.disease.toLowerCase().includes(term));

            const container = document.getElementById('resultsContainer');
            const empty = document.getElementById('emptyState');
            container.innerHTML = '';

            if (results.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            results.forEach(item => {
                container.innerHTML += `
                    <div class="bg-white border border-gray-100 rounded-3xl p-6 hover:shadow-md">
                        <div class="font-semibold text-lg">${item.disease}</div>
                        <div class="text-5xl font-bold text-emerald-600 mt-4">${item.count}</div>
                        <div class="text-sm text-gray-500">Total Cases</div>
                        <button onclick="viewCondition('${item.disease}')" class="mt-6 w-full py-3 border rounded-3xl text-sm">View Records →</button>
                    </div>`;
            });
        }

        function viewCondition(disease) {
            alert(`Showing records for: ${disease}`);
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }

        window.onload = () => {
            tailwind.config = { theme: { extend: {} } };
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            document.getElementById('user-name').textContent = user.name || "Nurse Sarah";
            document.getElementById('user-role').textContent = user.role || "School Nurse";
            performSearch();
        };
    </script>
</body>
</html>
