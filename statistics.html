<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSys - Statistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <div class="w-64 bg-white border-r flex flex-col">
            <div class="p-6 border-b flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-2xl">🏥</div>
                <div class="text-3xl font-semibold text-emerald-600">HealthSys</div>
            </div>
            <nav class="flex-1 px-3 py-6 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-house w-5"></i> Dashboard</a>
                <a href="new-visit.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-plus w-5"></i> New Visit</a>
                <a href="records.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-folder w-5"></i> Records</a>
                <a href="search.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-magnifying-glass w-5"></i> Search</a>
                <a href="statistics.html" class="flex items-center gap-3 px-4 py-3 bg-emerald-50 text-emerald-700 rounded-3xl font-medium"><i class="fa-solid fa-chart-bar w-5"></i> Statistics</a>
            </nav>
            <div class="p-6 border-t">
                <a href="login.html" onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-3xl font-medium"><i class="fa-solid fa-right-from-bracket w-5"></i> Logout</a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-white border-b px-8 flex items-center justify-between">
                <h1 class="text-2xl font-semibold">Statistics</h1>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <div class="font-semibold" id="user-name">Nurse Sarah</div>
                            <div class="text-xs text-gray-500">School Nurse</div>
                        </div>
                        <div class="w-9 h-9 bg-emerald-100 rounded-2xl flex items-center justify-center text-xl">👩‍⚕️</div>
                    </div>
                </div>
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <div class="max-w-7xl mx-auto space-y-8">
                    
                    <!-- Top Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <div class="text-6xl font-bold text-gray-900" id="total-cases">342</div>
                            <div class="text-gray-500 mt-1">Total Cases</div>
                        </div>
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <div class="text-5xl font-bold text-orange-500" id="most-common">Seasonal Flu</div>
                            <div class="text-gray-500 mt-1">Most Common</div>
                        </div>
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <div class="text-6xl font-bold text-gray-900" id="avg-visits">18.4</div>
                            <div class="text-gray-500 mt-1">Avg. Daily Visits</div>
                        </div>
                    </div>

                    <!-- Charts -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Bar Chart -->
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <h3 class="font-semibold text-lg mb-6">Cases per Disease</h3>
                            <canvas id="casesBarChart" height="110"></canvas>
                        </div>

                        <!-- Line Chart -->
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <h3 class="font-semibold text-lg mb-6">Visits Over Time</h3>
                            <canvas id="visitsLineChart" height="110"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let barChart, lineChart;

        function getRecords() {
            if (!localStorage.getItem('healthRecords')) {
                const initial = [
                    {disease: "Seasonal Flu", visitDate: "2025-10-15"},
                    {disease: "Asthma", visitDate: "2025-10-15"},
                    {disease: "Allergic Reaction", visitDate: "2025-10-14"},
                    {disease: "Migraine", visitDate: "2025-10-14"},
                    {disease: "Sprained Ankle", visitDate: "2025-10-13"},
                    {disease: "Seasonal Flu", visitDate: "2025-10-12"},
                    {disease: "Dengue Fever", visitDate: "2025-10-12"},
                    {disease: "Hypertension", visitDate: "2025-10-11"},
                    {disease: "Common Cold", visitDate: "2025-10-10"},
                    {disease: "Seasonal Flu", visitDate: "2025-10-09"}
                ];
                localStorage.setItem('healthRecords', JSON.stringify(initial));
            }
            return JSON.parse(localStorage.getItem('healthRecords') || '[]');
        }

        function calculateStats(records) {
            const totalCases = records.length;

            // Most common disease
            const diseaseCount = {};
            records.forEach(r => {
                diseaseCount[r.disease] = (diseaseCount[r.disease] || 0) + 1;
            });
            const mostCommon = Object.keys(diseaseCount).reduce((a, b) => 
                diseaseCount[a] > diseaseCount[b] ? a : b, "No Data");

            // Avg daily visits (mock calculation)
            const avgVisits = (totalCases / 18.5).toFixed(1);

            return { totalCases, mostCommon, avgVisits, diseaseCount };
        }

        function renderCharts(records) {
            const diseaseCount = {};
            records.forEach(r => {
                diseaseCount[r.disease] = (diseaseCount[r.disease] || 0) + 1;
            });

            const sortedDiseases = Object.entries(diseaseCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6);

            const labels = sortedDiseases.map(d => d[0]);
            const data = sortedDiseases.map(d => d[1]);

            // Destroy old charts
            if (barChart) barChart.destroy();
            if (lineChart) lineChart.destroy();

            // Bar Chart
            barChart = new Chart(document.getElementById('casesBarChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Number of Cases',
                        data: data,
                        backgroundColor: '#10b981',
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f3f4f6' } },
                        x: { grid: { color: '#f3f4f6' } }
                    }
                }
            });

            // Line Chart (mock monthly trend based on real data)
            const months = ['May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct'];
            const visitsTrend = [312, 278, 210, 345, 412, 389]; // Can be made dynamic later

            lineChart = new Chart(document.getElementById('visitsLineChart'), {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Visits',
                        data: visitsTrend,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 5,
                        pointBackgroundColor: '#ffffff',
                        pointBorderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#f3f4f6' } },
                        x: { grid: { color: '#f3f4f6' } }
                    }
                }
            });
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = "login.html";
        }

        // Initialize
        window.onload = () => {
            tailwind.config = { theme: { extend: {} } };
            document.getElementById('user-name').textContent = "Nurse Sarah";

            const records = getRecords();
            const stats = calculateStats(records);

            document.getElementById('total-cases').textContent = stats.totalCases;
            document.getElementById('most-common').textContent = stats.mostCommon;
            document.getElementById('avg-visits').textContent = stats.avgVisits;

            renderCharts(records);
        };
    </script>
</body>
</html>
