<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSys - Statistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui; }
        .chart-container { height: 320px; position: relative; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <div class="w-64 bg-white border-r flex flex-col">
            <div class="p-6 border-b flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-2xl">🏥</div>
                <div class="text-3xl font-semibold text-emerald-600">HealthSys</div>
            </div>
            <nav class="flex-1 px-3 py-6 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-house w-5"></i> Dashboard</a>
                <a href="new-visit.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-plus w-5"></i> New Visit</a>
                <a href="records.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-folder w-5"></i> Records</a>
                <a href="search.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-magnifying-glass w-5"></i> Search</a>
                <a href="statistics.html" class="flex items-center gap-3 px-4 py-3 bg-emerald-50 text-emerald-700 rounded-3xl font-medium"><i class="fa-solid fa-chart-bar w-5"></i> Statistics</a>
            </nav>
            <div class="p-6 border-t">
                <a href="login.html" onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-3xl font-medium"><i class="fa-solid fa-right-from-bracket w-5"></i> Logout</a>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-white border-b px-8 flex items-center justify-between">
                <h1 class="text-2xl font-semibold">Statistics</h1>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="font-semibold" id="user-name"></div>
                        <div class="text-xs text-gray-500" id="user-role"></div>
                    </div>
                    <div class="w-9 h-9 bg-emerald-100 rounded-2xl flex items-center justify-center text-xl">👩‍⚕️</div>
                </div>
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <div class="max-w-7xl mx-auto space-y-8">
                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <div class="text-6xl font-bold" id="total-cases">0</div>
                            <div class="text-gray-500">Total Cases</div>
                        </div>
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <div class="text-5xl font-bold text-orange-500" id="most-common">No Data</div>
                            <div class="text-gray-500">Most Common</div>
                        </div>
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <div class="text-6xl font-bold" id="avg-visits">0</div>
                            <div class="text-gray-500">Avg. Daily Visits</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <h3 class="font-semibold mb-6">Cases per Disease</h3>
                            <div class="chart-container"><canvas id="casesBarChart"></canvas></div>
                        </div>
                        <div class="bg-white rounded-3xl p-8 shadow-sm">
                            <h3 class="font-semibold mb-6">Visits Over Time</h3>
                            <div class="chart-container"><canvas id="visitsLineChart"></canvas></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let barChart, lineChart;

        function getRecords() {
            if (!localStorage.getItem('healthRecords')) {
                localStorage.setItem('healthRecords', JSON.stringify([]));
            }
            return JSON.parse(localStorage.getItem('healthRecords'));
        }

        function renderCharts() {
            const records = getRecords();
            const diseaseCount = {};
            records.forEach(r => {
                const d = r.disease || "Unknown";
                diseaseCount[d] = (diseaseCount[d] || 0) + 1;
            });

            const sorted = Object.entries(diseaseCount).sort((a,b) => b[1] - a[1]).slice(0,6);
            const labels = sorted.map(d => d[0]);
            const data = sorted.map(d => d[1]);

            const maxY = Math.max(10, Math.max(...data, 0) * 1.2);

            if (barChart) barChart.destroy();
            barChart = new Chart(document.getElementById('casesBarChart'), {
                type: 'bar',
                data: { labels: labels.length ? labels : ["No Data"], datasets: [{ data: data.length ? data : [0], backgroundColor: '#10b981', borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: maxY }, x: {} }}
            });

            if (lineChart) lineChart.destroy();
            lineChart = new Chart(document.getElementById('visitsLineChart'), {
                type: 'line',
                data: {
                    labels: ['May','Jun','Jul','Aug','Sep','Oct'],
                    datasets: [{ label: 'Visits', data: [312,278,210,345,412,389], borderColor: '#10b981', tension: 0.4, borderWidth: 3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }

        window.onload = () => {
            tailwind.config = { theme: { extend: {} } };
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            document.getElementById('user-name').textContent = user.name || "Nurse Sarah";
            document.getElementById('user-role').textContent = user.role || "School Nurse";

            const records = getRecords();
            document.getElementById('total-cases').textContent = records.length;
            document.getElementById('most-common').textContent = Object.keys(records.reduce((a,r) => {a[r.disease] = (a[r.disease]||0)+1; return a;}, {})).sort((a,b)=>records.filter(r=>r.disease===b).length - records.filter(r=>r.disease===a).length)[0] || "No Data";
            document.getElementById('avg-visits').textContent = (records.length / 18.5).toFixed(1);

            renderCharts();
        };
    </script>
</body>
</html>
