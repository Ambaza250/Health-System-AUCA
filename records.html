<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSys - All Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <div class="w-64 bg-white border-r flex flex-col">
            <div class="p-6 border-b flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-2xl">🏥</div>
                <div class="text-3xl font-semibold text-emerald-600">HealthSys</div>
            </div>
            <nav class="flex-1 px-3 py-6 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-house w-5"></i> Dashboard</a>
                <a href="new-visit.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-plus w-5"></i> New Visit</a>
                <a href="records.html" class="flex items-center gap-3 px-4 py-3 bg-emerald-50 text-emerald-700 rounded-3xl font-medium"><i class="fa-solid fa-folder w-5"></i> Records</a>
                <a href="search.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-magnifying-glass w-5"></i> Search</a>
                <a href="statistics.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-100 rounded-3xl font-medium"><i class="fa-solid fa-chart-bar w-5"></i> Statistics</a>
            </nav>
            <div class="p-6 border-t">
                <a href="login.html" onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-3xl font-medium"><i class="fa-solid fa-right-from-bracket w-5"></i> Logout</a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-white border-b px-8 flex items-center justify-between">
                <h1 class="text-2xl font-semibold">All Records</h1>
                <div class="flex items-center gap-6">
                    <button onclick="exportCSV()" class="flex items-center gap-2 px-5 py-2.5 border border-gray-300 rounded-3xl hover:bg-gray-50">
                        <i class="fa-solid fa-download"></i> Export
                    </button>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <div class="font-semibold" id="user-name"></div>
                            <div class="text-xs text-gray-500" id="user-role"></div>
                        </div>
                        <div class="w-9 h-9 bg-emerald-100 rounded-2xl flex items-center justify-center text-xl">👩‍⚕️</div>
                    </div>
                </div>
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <div class="bg-white rounded-3xl shadow-sm">
                    <div class="p-6 border-b flex gap-4">
                        <input id="searchInput" onkeyup="filterTable()" 
                               type="text" placeholder="Search by name or ID..." 
                               class="flex-1 border border-gray-200 focus:border-emerald-500 rounded-3xl px-6 py-4 outline-none">
                        <select id="diseaseFilter" onchange="filterTable()" 
                                class="border border-gray-200 rounded-3xl px-6 py-4 outline-none">
                            <option value="">All Diseases</option>
                        </select>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full" id="recordsTable"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- UPDATE MODAL -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl">
            <div class="p-6 border-b flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-check-circle text-emerald-500 text-xl"></i>
                    <h2 class="text-xl font-semibold">Update Student Record</h2>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>

            <div class="p-6 space-y-6">
                <!-- Student Info -->
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl">
                    <div id="modal-avatar" class="w-12 h-12 bg-emerald-100 rounded-2xl flex items-center justify-center text-3xl">👤</div>
                    <div>
                        <div id="modal-name" class="font-semibold text-lg"></div>
                        <div id="modal-info" class="text-sm text-gray-500"></div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Disease / Condition <span class="text-red-500">*</span></label>
                    <input id="modal-disease" type="text" 
                           class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:border-emerald-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Treatment / Prescription <span class="text-red-500">*</span></label>
                    <textarea id="modal-treatment" rows="3" 
                              class="w-full border border-gray-300 rounded-3xl px-4 py-3 focus:border-emerald-500 outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Visit Date <span class="text-red-500">*</span></label>
                    <input id="modal-date" type="date" 
                           class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:border-emerald-500 outline-none">
                </div>

                <div id="last-updated" class="text-xs bg-amber-50 border border-amber-100 text-amber-700 px-4 py-3 rounded-2xl"></div>
            </div>

            <div class="p-6 border-t flex gap-3">
                <button onclick="closeModal()" 
                        class="flex-1 py-4 border border-gray-300 rounded-3xl font-medium">Cancel</button>
                <button onclick="saveUpdatedRecord()" 
                        class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-semibold">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        let currentEditingId = null;

        function initDatabase() {
            if (!localStorage.getItem('healthRecords')) {
                const initial = [
                    {id:"REC-001", studentId:"STU-8921", name:"Michael Chen", age:18, disease:"Seasonal Flu", treatment:"Tamiflu 75mg, Rest", visitDate:"2025-10-15", status:"Recovered"},
                    {id:"REC-002", studentId:"STU-7432", name:"Sarah Jenkins", age:17, disease:"Asthma", treatment:"Salbutamol inhaler", visitDate:"2025-10-15", status:"Chronic"},
                    {id:"REC-003", studentId:"STU-9012", name:"David Rodriguez", age:15, disease:"Allergic Reaction", treatment:"Epinephrine, Benadryl", visitDate:"2025-10-14", status:"Emergency"}
                ];
                localStorage.setItem('healthRecords', JSON.stringify(initial));
            }
        }

        function getRecords() {
            initDatabase();
            return JSON.parse(localStorage.getItem('healthRecords') || '[]');
        }

        function saveRecords(records) {
            localStorage.setItem('healthRecords', JSON.stringify(records));
        }

        function renderTable(records) {
            let html = `
                <thead>
                    <tr class="text-xs text-gray-400 border-b">
                        <th class="text-left py-5 px-6">STUDENT ID</th>
                        <th class="text-left py-5 px-6">NAME</th>
                        <th class="text-left py-5 px-6">AGE</th>
                        <th class="text-left py-5 px-6">DISEASE</th>
                        <th class="text-left py-5 px-6">TREATMENT</th>
                        <th class="text-left py-5 px-6">DATE</th>
                        <th class="text-left py-5 px-6">ACTIONS</th>
                    </tr>
                </thead>
                <tbody>`;
            
            records.forEach(r => {
                html += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="py-5 px-6 font-medium">${r.studentId}</td>
                        <td class="py-5 px-6">${r.name}</td>
                        <td class="py-5 px-6">${r.age}</td>
                        <td class="py-5 px-6"><span class="px-4 py-1 bg-emerald-100 text-emerald-700 rounded-3xl text-xs">${r.disease}</span></td>
                        <td class="py-5 px-6 text-gray-600 text-sm">${r.treatment.substring(0, 45)}${r.treatment.length > 45 ? '...' : ''}</td>
                        <td class="py-5 px-6">${r.visitDate}</td>
                        <td class="py-5 px-6">
                            <button onclick="editRecord('${r.id}')" class="text-emerald-600 hover:text-emerald-700 mr-4">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                        </td>
                    </tr>`;
            });
            html += `</tbody>`;
            document.getElementById('recordsTable').innerHTML = html;
        }

        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const records = getRecords();
            const filtered = records.filter(r => 
                r.name.toLowerCase().includes(term) || 
                r.studentId.toLowerCase().includes(term) ||
                r.disease.toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        function editRecord(id) {
            const records = getRecords();
            const record = records.find(r => r.id === id);
            if (!record) return;

            currentEditingId = id;

            // Fill modal
            document.getElementById('modal-name').textContent = record.name;
            document.getElementById('modal-info').innerHTML = `Grade 10 • Section A • Age ${record.age}<br><span class="font-medium">${record.studentId}</span>`;
            document.getElementById('modal-disease').value = record.disease || "";
            document.getElementById('modal-treatment').value = record.treatment || "";
            document.getElementById('modal-date').value = record.visitDate || "";

            document.getElementById('last-updated').innerHTML = `
                Last updated on ${new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})} 
                at ${new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'})} by Nurse Sarah
            `;

            document.getElementById('editModal').classList.remove('hidden');
        }

        function saveUpdatedRecord() {
            if (!currentEditingId) return;

            const records = getRecords();
            const index = records.findIndex(r => r.id === currentEditingId);

            if (index !== -1) {
                records[index].disease = document.getElementById('modal-disease').value;
                records[index].treatment = document.getElementById('modal-treatment').value;
                records[index].visitDate = document.getElementById('modal-date').value;
            }

            saveRecords(records);
            closeModal();
            renderTable(getRecords());
            alert("✅ Record updated successfully!");
        }

        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
            currentEditingId = null;
        }

        function exportCSV() {
            alert("✅ Records exported as CSV (demo)");
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }

        window.onload = () => {
            tailwind.config = { theme: { extend: {} } };
            
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            document.getElementById('user-name').textContent = user.name || "Nurse Sarah";
            document.getElementById('user-role').textContent = user.role || "School Nurse";

            renderTable(getRecords());
        };
    </script>
</body>
</html>
